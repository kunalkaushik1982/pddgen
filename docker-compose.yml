services:
  postgres:
    image: postgres:16-alpine
    container_name: pddgen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pddgen_db
      POSTGRES_USER: pddgen
      POSTGRES_PASSWORD: pddgen_secure_password
    ports:
      - "5434:5432"
    volumes:
      - pddgen_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pddgen -d pddgen_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pddgen-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - pddgen_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pddgen-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    ports:
      - "8002:8000"
    environment:
      - PRODUCTION_MODE=true
      - WEB_CONCURRENCY=5
      - PDD_GENERATOR_DATABASE_URL=postgresql+psycopg://pddgen:pddgen_secure_password@postgres:5432/pddgen_db
      - PDD_GENERATOR_REDIS_URL=redis://redis:6379/1
      - PDD_GENERATOR_AUTH_PUBLIC_APP_URL=http://localhost:8082
      - PDD_GENERATOR_AUTH_API_PUBLIC_BASE_URL=http://localhost:8082/api
      - PDD_GENERATOR_USER_QUOTA_LIFETIME_JOBS=1000
      - PDD_GENERATOR_USER_QUOTA_DAILY_JOBS=100
      - PDD_GENERATOR_LOCAL_STORAGE_ROOT=/app/storage/local

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: pddgen-worker
    restart: unless-stopped
    env_file:
      - worker/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./storage:/app/storage
    environment:
      - CELERY_CONCURRENCY=6
      - PDD_GENERATOR_DATABASE_URL=postgresql+psycopg://pddgen:pddgen_secure_password@postgres:5432/pddgen_db
      - PDD_GENERATOR_REDIS_URL=redis://redis:6379/1
      - PDD_GENERATOR_LOCAL_STORAGE_ROOT=/app/storage/local

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: "113903842599-k4c47v59tvin0d6lcb24kckks1loj7o5.apps.googleusercontent.com"
    container_name: pddgen-frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: pddgen-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8082:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/app/storage:ro

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: pddgen-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  pddgen_postgres_data:
  pddgen_redis_data:
